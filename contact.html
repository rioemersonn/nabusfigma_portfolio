<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rio's Portfolio — Contact</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="css/style.css" rel="stylesheet"/>
</head>
<body class="d-flex flex-column min-vh-100">

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">Rio's Portfolio</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto gap-1">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About Me</a></li>
          <li class="nav-item"><a class="nav-link" href="skills.html">Skills</a></li>
          <li class="nav-item"><a class="nav-link" href="hobbies.html">Hobbies</a></li>
          <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <h1>Contact</h1>
  </div>

  <!-- CONTENT -->
  <main class="flex-grow-1 py-5" style="background-color: var(--sage-mid);">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">

          <!-- Contact info card -->
          <div class="content-card mb-4">
            <p class="info-label">Facebook</p>
            <p class="info-value">Rio Emerson B. Nabus</p>

            <p class="info-label">Contact No.</p>
            <p class="info-value mb-0">09676748384</p>
          </div>

          <!-- Message form -->
          <div class="content-card">
            <h5 class="text-white mb-4" style="font-family:'Playfair Display',serif;">Send a Message</h5>

            <div class="mb-3">
              <label class="info-label d-block mb-1">Your Name</label>
              <input type="text" class="form-control" placeholder="Enter your name"
                style="background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.25); color:#fff; border-radius:8px;">
            </div>
            <div class="mb-3">
              <label class="info-label d-block mb-1">Your Email</label>
              <input type="email" class="form-control" placeholder="Enter your email"
                style="background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.25); color:#fff; border-radius:8px;">
            </div>
            <div class="mb-4">
              <label class="info-label d-block mb-1">Message</label>
              <textarea rows="4" class="form-control" placeholder="Write your message here..."
                style="background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.25); color:#fff; border-radius:8px; resize:none;"></textarea>
            </div>

            <button type="button" class="btn-cream w-100" style="padding:13px; text-align:center;">
              Send Message
            </button>
          </div>

          <!-- Navigation -->
          <div class="d-flex justify-content-start mt-4">
            <a href="hobbies.html" class="btn-cream" style="padding:10px 28px; font-size:.9rem;">← Hobbies</a>
          </div>

        </div>
      </div>
    </div>
  </main>

  <footer>© 2025 Rio Emerson Bengwayan Nabus. All rights reserved.</footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
